<!DOCTYPE html>
<html>
<head>
  <title>Reset Password</title>

  <!-- Bootstrap CSS -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

  <!-- Bootstrap Icons -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons/font/bootstrap-icons.css" rel="stylesheet">

  <!-- Custom CSS -->
  <link rel="stylesheet" href="styles.css">

  <meta name="viewport" content="width=device-width, initial-scale=1.0">
</head>

<body>

<!-- NAVBAR -->
<nav class="navbar navbar-dark bg-dark">
  <div class="container-fluid">
    <span class="navbar-brand">Auth System</span>
    <a href="login.html" class="btn btn-outline-light">Login</a>
  </div>
</nav>

<!-- RESET PASSWORD CARD -->
<div class="container d-flex justify-content-center align-items-center" style="min-height: 80vh;">

  <div class="card shadow-lg p-4 w-100" style="max-width: 350px;">

    <h3 class="text-center mb-4">Reset Password</h3>

    <form>

      <div class="mb-3">
        <label class="form-label">New Password</label>
        <input type="password" id="password" class="form-control" placeholder="Enter new password" required>
      </div>

      <div class="mb-3">
        <label class="form-label">Confirm Password</label>
        <input type="password" id="confirmPassword" class="form-control" placeholder="Confirm password" required>
      </div>

      <button type="button" class="btn btn-secondary mb-3 w-100" onclick="togglePassword()">
        Show / Hide Password
      </button>

      <button type="submit" class="btn btn-primary w-100">
        Update Password
      </button>

    </form>

    <!-- Navigation -->
    <div class="text-center mt-3">
      <a href="login.html">Back to Login</a>
    </div>

  </div>

</div>

<!-- JS -->
<script>
function togglePassword() {
  let pass = document.getElementById("password");
  let confirm = document.getElementById("confirmPassword");

  pass.type = pass.type === "password" ? "text" : "password";
  confirm.type = confirm.type === "password" ? "text" : "password";
}
</script>

<!-- Bootstrap JS -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
