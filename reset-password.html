<!DOCTYPE html>
<html>
<head>
<title>Reset Password</title>
<!-- Bootstrap CSS -->
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

<!-- Bootstrap Icons -->
<link href="https://cdn.jsdelivr.net/npm/bootstrap-icons/font/bootstrap-icons.css" rel="stylesheet">

<!-- Custom CSS -->
<link rel="stylesheet" href="styles.css">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
</head>
<body>

<h1>Reset Password</h1>

<body>

<div class="container d-flex justify-content-center align-items-center" style="height: 75vh;">

  <div class="card p-4 w-100" style="max-width: 350px;">

    <h3 class="text-center mb-4">Reset Password</h3>

    <form>

      <div class="mb-3">
        <label class="form-label">New Password</label>
        <input type="password" id="password" class="form-control" placeholder="Enter new password">
      </div>

      <div class="mb-3">
        <label class="form-label">Confirm Password</label>
        <input type="password" class="form-control" placeholder="Confirm password">
      </div>

      <button type="button" class="btn btn-secondary mb-3 w-100" onclick="togglePassword()">
        Show Password
      </button>

      <button class="btn btn-primary w-100">Update Password</button>

    </form>

    <div class="text-center mt-3">
      <a href="index.html">Back to Login</a>
    </div>

  </div>

</div>

<script>
function togglePassword() {
  let pass = document.getElementById("password");
  pass.type = pass.type === "password" ? "text" : "password";
}
</script>

</body>

<hr>

<a href="login.html">Return to Login</a>
<!-- Bootstrap JS -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<div class="card"></div>

</body>
</html>
