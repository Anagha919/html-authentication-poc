<!DOCTYPE html>
<html>
<head>
<title>Login</title>
<!-- Bootstrap CSS -->
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

<!-- Bootstrap Icons -->
<link href="https://cdn.jsdelivr.net/npm/bootstrap-icons/font/bootstrap-icons.css" rel="stylesheet">

<!-- Custom CSS -->
<link rel="stylesheet" href="styles.css">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
</head>
<body>

<h1>Login Page</h1>

<body>

<div class="container d-flex justify-content-center align-items-center" style="height: 65vh;">

  <div class="card p-4 w-100" style="max-width: 350px;">

    <h3 class="text-center mb-4">Login</h3>

    <form>
      <div class="mb-3">
        <label class="form-label">Email</label>
        <input type="email" class="form-control" placeholder="Enter email">
      </div>

      <div class="mb-3">
        <label class="form-label">Password</label>
        <input type="password" class="form-control" placeholder="Enter password">
      </div>

      <button class="btn btn-primary w-100">Login</button>
    </form>

    <div class="text-center mt-3">
      <a href="register.html">Register</a> |
      <a href="forgot-password.html">Forgot Password?</a>
    </div>

  </div>

</div>

</body>

<hr>

<a href="dashboard.html">Login to Dashboard</a><br>
<a href="register.html">Create Account</a><br>
<a href="forgot-password.html">Forgot Password?</a>
<!-- Bootstrap JS -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
